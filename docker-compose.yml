services:
  postgres:
    image: postgres:16
    container_name: tsync-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./DB/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  importer:
    build: ./DB/importer
    container_name: tsync-importer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_DATA_API_KEY: ${PUBLIC_DATA_API_KEY}
      SYNC_TARGET: ${SYNC_TARGET:-all}
    volumes:
      - ./DB/importer:/app
    working_dir: /app
    command: ["python", "-u", "app.py"]

  backend:
    build: ./backend
    container_name: tsync-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"

volumes:
  pgdata:
    external: true
    name: db_pgdata
